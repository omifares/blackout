name: Build and Release

# Isso diz ao GitHub para rodar esse script APENAS quando você publicar um Release
on:
  release:
    types: [published]

# Permissão necessária para o bot do GitHub fazer o upload dos arquivos
permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    # A matrix roda o mesmo "job" em vários sistemas operacionais simultaneamente
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: blackout-linux-amd64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: blackout-windows-amd64.zip
          - os: macos-latest # Mac Intel
            target: x86_64-apple-darwin
            archive_name: blackout-macos-intel.tar.gz
          - os: macos-14 # Mac Apple Silicon (M1/M2/M3)
            target: aarch64-apple-darwin
            archive_name: blackout-macos-arm64.tar.gz

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Compilar (Release)
        run: cargo build --release --target ${{ matrix.target }}

      # Passo específico para Linux/Mac: Empacotar como .tar.gz
      - name: Empacotar (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.archive_name }} blackout blackoutd

      # Passo específico para Windows: Empacotar como .zip
      - name: Empacotar (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path blackout.exe, blackoutd.exe -DestinationPath ../../../${{ matrix.archive_name }}

      # Fazer o upload do pacote final para a tela de Release do GitHub
      - name: Upload para o Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}